name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv via pip
        run: |
          python3 -m pip install --user "uv==0.11.24"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: mypy (type check)
        run: uv run mypy src

      - name: pytest (unit + integration)
        run: uv run pytest -v

  infra:
    name: infra (CDK synth + jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CDK synth (all stacks)
        run: npx cdk synth --all -q

      - name: jest (unit)
        run: npx jest --ci

  docker:
    name: docker build (Lambda image)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # docker/setup-qemu-action v3.2.0
      - name: Set up QEMU (for arm64 build)
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf

      # docker/setup-buildx-action v3.7.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349

      - name: Build Lambda image (linux/arm64)
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
